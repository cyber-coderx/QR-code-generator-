
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Canvas QR Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
background:#f2f2f2;
}

canvas{
background:white;
padding:12px;
}

input{
padding:10px;
width:260px;
}

button{
padding:10px 15px;
margin-left:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>QR Code Generator (Canvas)</h2>

<input id="text" placeholder="Enter text or URL">
<button onclick="generate()">Generate</button>

<br><br>

<canvas id="qrCanvas" width="210" height="210"></canvas>

<script>

const SIZE=21
const SCALE=10

function generate(){

let text=document.getElementById("text").value

let bits=""

for(let i=0;i<text.length;i++){
bits+=text.charCodeAt(i).toString(2).padStart(8,"0")
}

let matrix=[]
let reserved=[]

for(let r=0;r<SIZE;r++){
matrix[r]=[]
reserved[r]=[]

for(let c=0;c<SIZE;c++){
matrix[r][c]=0
reserved[r][c]=false
}
}

drawFinder(matrix,reserved,0,0)
drawFinder(matrix,reserved,0,14)
drawFinder(matrix,reserved,14,0)

drawTiming(matrix,reserved)

placeData(matrix,reserved,bits)

applyMask(matrix,reserved)

drawCanvas(matrix)

}

function drawFinder(m,res,r0,c0){

for(let r=0;r<7;r++){
for(let c=0;c<7;c++){

let val=(r==0||r==6||c==0||c==6||(r>=2&&r<=4&&c>=2&&c<=4))

m[r0+r][c0+c]=val?1:0
res[r0+r][c0+c]=true

}
}

}

function drawTiming(m,res){

for(let i=8;i<13;i++){

let v=i%2

m[6][i]=v
m[i][6]=v

res[6][i]=true
res[i][6]=true

}

}

function placeData(m,res,bits){

let dir=-1
let col=SIZE-1
let bit=0

while(col>0){

if(col==6) col--

for(let r=(dir>0?0:SIZE-1); r>=0 && r<SIZE; r+=dir){

for(let c=0;c<2;c++){

let x=col-c
let y=r

if(!res[y][x] && bit<bits.length){

m[y][x]=bits[bit]=="1"?1:0
bit++

}

}

}

dir*=-1
col-=2

}

}

function applyMask(m,res){

for(let r=0;r<SIZE;r++){
for(let c=0;c<SIZE;c++){

if(!res[r][c]){

if((r+c)%2==0){
m[r][c]^=1
}

}

}
}

}

function drawCanvas(matrix){

let canvas=document.getElementById("qrCanvas")
let ctx=canvas.getContext("2d")

ctx.fillStyle="white"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="black"

for(let r=0;r<SIZE;r++){
for(let c=0;c<SIZE;c++){

if(matrix[r][c]){

ctx.fillRect(
c*SCALE,
r*SCALE,
SCALE,
SCALE
)

}

}
}

}

</script>

</body>
</html>
